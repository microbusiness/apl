
services:
  proxy:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - frontend

  app:
    build:
      no_cache: true
      context: .
      target: production
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      URL_SERVICE: ${URL_SERVICE}
  frontend:
    build:
      no_cache: true
      context: ./frontend
      args:
        REACT_APP_I18N_API_URL: ${REACT_APP_I18N_API_URL:-}
        REACT_APP_DEFAULT_LANG: ${REACT_APP_DEFAULT_LANG:-}
